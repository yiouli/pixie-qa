name: Daily Release and Publish

on:
  schedule:
    # Run at 4am PST (12pm UTC) every day
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating tags and releases
      id-token: write # Required for trusted publishing to PyPI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for accurate git history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for commits since last successful daily release
        id: release_guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WORKFLOW_FILE="daily-release.yml"
          BRANCH="${{ github.ref_name }}"
          : "${BRANCH:=main}"

          RESPONSE=$(gh api \
            repos/$GITHUB_REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs \
            -f status=success \
            -f branch="$BRANCH" \
            -f per_page=1 2>/dev/null || true)

          LAST_SUCCESS_SHA=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_sha // ""')

          echo "Last successful run commit: ${LAST_SUCCESS_SHA:-none found}"

          if [[ -z "$LAST_SUCCESS_SHA" ]]; then
            echo "No prior successful runs detected; continuing with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$LAST_SUCCESS_SHA^{commit}" 2>/dev/null; then
            echo "Last successful run commit not present locally; continuing with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS_SINCE=$(git rev-list --count "$LAST_SUCCESS_SHA"..HEAD)
          echo "Commits since last successful run: $COMMITS_SINCE"

          if [[ "$COMMITS_SINCE" -gt 0 ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release when no new commits
        if: steps.release_guard.outputs.should_release != 'true'
        run: echo "No new commits since last successful daily release. Skipping build and publish."

      - name: Set up Python
        if: steps.release_guard.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.release_guard.outputs.should_release == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Bump patch version
        if: steps.release_guard.outputs.should_release == 'true'
        id: bump_version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          content = Path("pyproject.toml").read_text()
          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)
          if not match:
              raise RuntimeError("Could not find version in pyproject.toml")

          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          new_content = re.sub(
              r'^(version\s*=\s*)"(\d+\.\d+\.\d+)"',
              f'\\g<1>"{new_version}"',
              content,
              flags=re.MULTILINE,
          )
          Path("pyproject.toml").write_text(new_content)
          print(f"Bumped version: {major}.{minor}.{patch} -> {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"new_version={new_version}\n")
          PY

      - name: Commit and push version bump
        if: steps.release_guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin HEAD

      - name: Build package
        if: steps.release_guard.outputs.should_release == 'true'
        run: uv build

      # Publishes using PyPI trusted publishing (OIDC — no API token needed).
      # Set this up at: https://pypi.org/manage/project/pixie-qa/settings/publishing/
      - name: Publish to PyPI
        if: steps.release_guard.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        if: steps.release_guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.bump_version.outputs.new_version }}"
          gh release create "$TAG" \
            dist/*.whl dist/*.tar.gz \
            --title "$TAG" \
            --notes "Automated daily release $TAG"
